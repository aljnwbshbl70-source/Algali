<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الجالية اليمنية - كنترول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; }
        .admin-card { @apply bg-white rounded-2xl p-6 shadow-sm border border-gray-100; }
        .input-field { @apply w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-[#14D162] outline-none transition-all; }
        .btn-primary { @apply bg-[#14D162] text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-green-200 active:scale-95 transition-all; }
        .tab-active { @apply bg-[#14D162] text-white shadow-md; }
    </style>
</head>
<body>

    <div id="login-overlay" class="fixed inset-0 z-[200] bg-white flex items-center justify-center px-6">
        <div class="max-w-md w-full text-center">
            <h1 class="text-4xl font-black text-gray-900 mb-2">تسجيل <span class="text-[#14D162]">الدخول</span></h1>
            <p class="text-gray-500 mb-8 font-bold text-sm underline">لوحة التحكم السرية - يامي</p>
            <div class="space-y-4">
                <input type="text" id="user" placeholder="اسم المستخدم" class="input-field text-center">
                <input type="password" id="pass" placeholder="كلمة المرور" class="input-field text-center">
                <button onclick="admin.login()" class="btn-primary w-full">دخول المسؤول</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden min-h-screen flex">
        <aside class="w-64 bg-white border-l border-gray-100 flex flex-col p-6 sticky top-0 h-screen">
            <div class="text-2xl font-black mb-10 text-gray-900">Admin <span class="text-[#14D162]">Hub</span></div>
            <nav class="space-y-2">
                <button onclick="admin.setTab('matches')" class="tab-btn w-full text-right p-4 rounded-xl font-bold text-gray-500 hover:bg-gray-50 tab-active">المباريات</button>
                <button onclick="admin.setTab('teams')" class="tab-btn w-full text-right p-4 rounded-xl font-bold text-gray-500 hover:bg-gray-50">الفرق</button>
                <button onclick="admin.setTab('lineups')" class="tab-btn w-full text-right p-4 rounded-xl font-bold text-gray-500 hover:bg-gray-50">التشكيلات</button>
                <button onclick="admin.setTab('ads')" class="tab-btn w-full text-right p-4 rounded-xl font-bold text-gray-500 hover:bg-gray-50">الإعلانات</button>
            </nav>
            <button onclick="location.reload()" class="mt-auto p-4 text-red-500 font-bold text-sm border-t border-gray-100">تسجيل خروج</button>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto">
            <div id="tab-matches" class="tab-content space-y-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-black">إدارة المباريات</h2>
                    <button onclick="admin.toggleModal('match-modal')" class="btn-primary">+ مباراة جديدة</button>
                </div>
                <div id="matches-grid" class="grid grid-cols-2 gap-6"></div>
            </div>

            <div id="match-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[210] flex items-center justify-center p-6">
                <div class="bg-white rounded-3xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                    <h3 class="text-xl font-black mb-6 border-b pb-4">إضافة / تعديل مباراة</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="m-teamA" placeholder="الفريق الأول" class="input-field col-span-1">
                        <input type="text" id="m-teamB" placeholder="الفريق الثاني" class="input-field col-span-1">
                        <input type="text" id="m-logoA" placeholder="رابط شعار A" class="input-field col-span-1">
                        <input type="text" id="m-logoB" placeholder="رابط شعار B" class="input-field col-span-1">
                        <input type="time" id="m-time" class="input-field col-span-1">
                        <select id="m-status" class="input-field col-span-1">
                            <option value="today">مباراة اليوم</option>
                            <option value="live">مباشر الآن</option>
                            <option value="finished">منتهية</option>
                        </select>
                        <input type="number" id="m-scoreA" placeholder="أهداف A" class="input-field col-span-1">
                        <input type="number" id="m-scoreB" placeholder="أهداف B" class="input-field col-span-1">
                    </div>
                    <div class="flex gap-4 mt-8">
                        <button onclick="admin.saveMatch()" class="btn-primary flex-1">حفظ البيانات</button>
                        <button onclick="admin.toggleModal('match-modal')" class="bg-gray-100 text-gray-500 font-bold px-8 rounded-xl">إلغاء</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsuwW_dpea2JUHrnMnXOYAoh_06NEbG9E",
            authDomain: "galia-e11a3.firebaseapp.com",
            projectId: "galia-e11a3",
            storageBucket: "galia-e11a3.firebasestorage.app",
            messagingSenderId: "1090802957360",
            appId: "1:1090802957360:web:94611af88b93a4819101f5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.admin = {
            login() {
                const u = document.getElementById('user').value;
                const p = document.getElementById('pass').value;
                if(u === 'galia' && p === 'developer') {
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('admin-panel').classList.remove('hidden');
                    this.loadData();
                } else {
                    alert('خطأ في بيانات الدخول يا يامي!');
                }
            },

            setTab(tab) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
                event.target.classList.add('tab-active');
                // Tab switching logic can be expanded here
            },

            toggleModal(id) {
                document.getElementById(id).classList.toggle('hidden');
            },

            async saveMatch() {
                const data = {
                    teamA: document.getElementById('m-teamA').value,
                    teamB: document.getElementById('m-teamB').value,
                    teamALogo: document.getElementById('m-logoA').value,
                    teamBLogo: document.getElementById('m-logoB').value,
                    time: document.getElementById('m-time').value,
                    status: document.getElementById('m-status').value,
                    scoreA: parseInt(document.getElementById('m-scoreA').value) || 0,
                    scoreB: parseInt(document.getElementById('m-scoreB').value) || 0,
                    timestamp: Date.now()
                };

                try {
                    await addDoc(collection(db, "matches"), data);
                    alert('تم الحفظ بنجاح!');
                    this.toggleModal('match-modal');
                } catch(e) { alert('خطأ: ' + e.message); }
            },

            loadData() {
                onSnapshot(collection(db, "matches"), (snapshot) => {
                    const grid = document.getElementById('matches-grid');
                    grid.innerHTML = '';
                    snapshot.forEach(docSnap => {
                        const m = docSnap.data();
                        grid.innerHTML += `
                            <div class="admin-card">
                                <div class="flex justify-between mb-4">
                                    <span class="bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-bold">${m.status}</span>
                                    <button onclick="admin.deleteMatch('${docSnap.id}')" class="text-red-400 hover:text-red-600">حذف</button>
                                </div>
                                <div class="text-center font-black text-lg">${m.teamA} VS ${m.teamB}</div>
                                <div class="text-center text-gray-400 mt-2">${m.time}</div>
                                <button class="w-full mt-6 py-2 border-2 border-gray-50 rounded-xl text-sm font-bold text-gray-500">تعديل التفاصيل</button>
                            </div>
                        `;
                    });
                });
            },

            async deleteMatch(id) {
                if(confirm('هل أنت متأكد من الحذف؟')) {
                    await deleteDoc(doc(db, "matches", id));
                }
            }
        };
    </script>
</body>
</html>
